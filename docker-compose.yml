version: "3.8"

# ============================================================
# Plexathon - Docker Compose
# ============================================================
# Start all services:   docker-compose up -d
# Stop all services:    docker-compose down
# View logs:            docker-compose logs -f
# ============================================================

services:

  # ------------------------------------------------------------
  # Cloudflare Tunnel — routes external traffic to containers
  # No open ports, no router config needed.
  # Requires: cloudflared/config.yml and cloudflared/<tunnel-id>.json
  # Set up by running: ./scripts/setup-cloudflare-tunnel.sh
  # ------------------------------------------------------------
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    volumes:
      - ./cloudflared:/etc/cloudflared
    environment:
      - TZ=${TIMEZONE}

  # ------------------------------------------------------------
  # Jellyfin — movies & TV
  # Local:    http://localhost:8096
  # Remote:   https://jellyfin.yourdomain.com
  # ------------------------------------------------------------
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    ports:
      - "8096:8096"
    environment:
      - TZ=${TIMEZONE}
    volumes:
      - ./jellyfin/config:/config
      - ./jellyfin/cache:/cache
      - ${MEDIA_PATH}:/media:ro

  # ------------------------------------------------------------
  # Audiobookshelf — audiobooks & podcasts
  # Local:    http://localhost:13378
  # Remote:   https://audiobooks.yourdomain.com
  # ------------------------------------------------------------
  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:latest
    container_name: audiobookshelf
    restart: unless-stopped
    ports:
      - "13378:80"
    environment:
      - TZ=${TIMEZONE}
    volumes:
      - ./audiobookshelf/config:/config
      - ./audiobookshelf/metadata:/metadata
      - ${MEDIA_PATH}/eLibrary:/eLibrary:ro

  # ------------------------------------------------------------
  # FileBrowser — web file manager
  # Local:    http://localhost:8080
  # Remote:   https://files.yourdomain.com
  # Default login: admin / admin  (change this immediately!)
  # ------------------------------------------------------------
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      # - ${THREED_PATH}:/3D_Printing
      - ./filebrowser/data/filebrowser.db:/database/filebrowser.db
      - ./filebrowser/config/settings.json:/config/settings.json
      - ${MEDIA_PATH}:/srv

  # ------------------------------------------------------------
  # Homepage — dashboard
  # Local:    http://localhost:3000
  # Remote:   https://home.yourdomain.com
  # ------------------------------------------------------------
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - HOMEPAGE_ALLOWED_HOSTS=home.${DOMAIN}
      - HOMEPAGE_VAR_DOMAIN=${DOMAIN}
    volumes:
      - ./homepage:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro

  # ------------------------------------------------------------
  # Gluetun — ProtonVPN client with kill switch
  # All torrent traffic is routed through this container.
  # If the VPN drops, torrent traffic stops (no leak).
  #
  # Setup: get a WireGuard private key from ProtonVPN:
  #   proton.me → VPN → Downloads → WireGuard → Generate
  #   Copy the "Private key" value into .env as PROTONVPN_PRIVATE_KEY
  # ------------------------------------------------------------
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "8090:8090"   # qBittorrent web UI (published here, not on qbittorrent)
      - "6881:6881"   # qBittorrent torrent port (TCP)
      - "6881:6881/udp"
    environment:
      - TZ=${TIMEZONE}
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${PROTONVPN_PRIVATE_KEY}
      - SERVER_NAMES=${PROTONVPN_SERVER}
    volumes:
      - ./gluetun:/gluetun

  # ------------------------------------------------------------
  # qBittorrent — torrent client
  # Local:    http://localhost:8090
  # Remote:   https://torrents.yourdomain.com
  #
  # Uses gluetun's network — all traffic goes through ProtonVPN.
  # Web UI port is exposed on the gluetun container above.
  # ------------------------------------------------------------
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    network_mode: "service:gluetun"   # All traffic via ProtonVPN — kill switch active
    depends_on:
      - gluetun
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIMEZONE}
      - WEBUI_PORT=8090
    volumes:
      - ./qbittorrent/config:/config
      - ${MEDIA_PATH}/downloads:/downloads
